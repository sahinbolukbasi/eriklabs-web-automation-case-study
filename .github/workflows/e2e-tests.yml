name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  E_BEBEK_PHONE: ${{ secrets.E_BEBEK_PHONE }}
  E_BEBEK_PASSWORD: ${{ secrets.E_BEBEK_PASSWORD }}
  HEADLESS: 'true'
  WORKERS: '2'

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (parallel workers)
        run: npx cucumber-js --profile parallel

      - name: Generate Allure report
        if: always()
        run: |
          if find allure-results -maxdepth 1 -name '*-result.json' -type f -print -quit 2>/dev/null | grep -q .; then
            npx allure-commandline generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            printf '%s\n' 'No Allure results were produced. Inspect the raw test logs and artifacts.' > allure-report/index.html
          fi

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: videos/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-traces
          path: traces/
          retention-days: 7
          if-no-files-found: ignore

  publish-allure-report:
    name: Publish Allure report
    needs: e2e-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
