name: E2E Tests

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  E_BEBEK_PHONE: ${{ secrets.E_BEBEK_PHONE }}
  E_BEBEK_PASSWORD: ${{ secrets.E_BEBEK_PASSWORD }}
  HEADLESS: 'true'

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (parallel, 2 workers)
        run: npx cucumber-js --profile parallel
        continue-on-error: true
        id: test-run

      - name: Generate Allure report
        if: always()
        run: npx allure-commandline generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: videos/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-traces
          path: traces/
          retention-days: 7
          if-no-files-found: ignore

      - name: Deploy Allure to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Check test result
        if: steps.test-run.outcome == 'failure'
        run: |
          echo "::warning::Some tests failed. Check the Allure report artifact for details."
          exit 1
